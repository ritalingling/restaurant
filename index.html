    main {
      width: min(760px, 100%);
      display: grid;
      gap: 16px;
      text-align: center;
    }

    .picker,
    .editor {
      width: 100%;
      padding: clamp(24px, 5vw, 52px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 1.04;
      font-weight: 850;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .result {
      min-height: 98px;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      padding: 18px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: clamp(30px, 8vw, 76px);
      line-height: 1.08;
      font-weight: 900;
      color: var(--accent-strong);
      overflow-wrap: anywhere;
    }

    .meta,
    .hint,
    .status {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .meta {
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      min-height: 50px;
      padding: 0 22px;
      font: inherit;
      font-weight: 800;
      color: #17120d;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(255, 122, 89, 0.25);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    button.secondary {
      color: var(--ink);
      background: rgba(255, 247, 237, 0.12);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.danger {
      color: #2b100c;
      background: var(--danger);
      box-shadow: none;
    }

    button:hover {
      transform: translateY(-2px);
      background: var(--accent-strong);
      box-shadow: 0 18px 38px rgba(255, 122, 89, 0.34);
    }

    button.secondary:hover {
      background: rgba(127, 199, 166, 0.18);
      box-shadow: none;
    }

    button:focus-visible,
    textarea:focus-visible {
      outline: 3px solid var(--green);
      outline-offset: 4px;
    }

    .editor {
      display: none;
      background: var(--panel-strong);
      text-align: left;
    }

    .editor.open {
      display: grid;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--ink);
      background: rgba(255, 247, 237, 0.08);
      font: 17px/1.55 "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    .editor .actions {
      justify-content: flex-start;
      margin-top: 4px;
    }

    .status {
      min-height: 24px;
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .picker,
      .editor {
        padding: 24px 16px;
      }

      .actions {
        width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="picker" aria-label="restaurant picker">
      <h1>&#20170;&#26202;&#21507;&#21738;&#23478;</h1>
      <div class="result" id="result" aria-live="polite"></div>
      <p class="meta" id="count"></p>
      <div class="actions">
        <button type="button" id="reroll">&#25442;&#19968;&#23478;</button>
        <button type="button" class="secondary" id="editToggle">&#32534;&#36753;&#39184;&#21381;&#24211;</button>
      </div>
    </section>

    <section class="editor" id="editor" aria-label="restaurant library editor">
      <h2>&#39184;&#21381;&#24211;</h2>
      <p class="hint">&#19968;&#34892;&#19968;&#20010;&#39184;&#21381;&#12290;</p>
      <textarea id="library"></textarea>
      <div class="actions">
        <button type="button" id="save">&#20445;&#23384;</button>
        <button type="button" class="secondary" id="cancel">&#25910;&#36215;</button>
        <button type="button" class="danger" id="reset">&#24674;&#22797;&#40664;&#35748;</button>
      </div>
      <p class="status" id="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const storageKey = "easyRestaurantPicker.restaurants";
    const defaultRestaurants = [
      "\u5409\u7965\u4e09\u5b9d\u2014\u5730\u9053\u4e1c\u5317\u83dc\uff08\u6709\u6728\u987b\u8089\uff09",
      "\u7267\u7f8a\u4eba",
      "Cho Sim",
      "\u817e\u817e\u9ec4\u7116\u9e21",
      "\u4e1c\u5317\u997a\u5b50\u738b",
      "\u76d6\u5192\u5192\u83dc",
      "\u5e72\u996d\u4eba\u2014\u8001\u5f0f\u4e1c\u5317\u76d2\u996d",
      "\u5927\u5f3a\u5c0f\u5f3a\u87ba\u86f3\u7c89\uff08\u6709\u732a\u811a\u996d\uff09",
      "\u826f\u8bb0\u5377\u997c",
      "\u738b\u9971\u9971\u70e7\u70e4\uff08\u6709\u6728\u987b\u8089\uff09",
      "\u4e00\u6c64\u4e00\u7c89\uff08\u76d2\u996d\uff09",
      "Fency",
      "\u5927\u7c73\u9c9c\u751f\u5c0f\u5403\u90e8",
      "Go Viet\uff08Pho\uff09",
      "\u5a46\u5a46\u9762",
      "Wingstop",
      "Burger King",
      "\u9ea6\u5f53\u52b3",
      "Japan Centre",
      "Murger Han",
      "Hachi Sushi & Bubble Tea"
    ];

    const result = document.querySelector("#result");
    const count = document.querySelector("#count");
    const reroll = document.querySelector("#reroll");
    const editToggle = document.querySelector("#editToggle");
    const editor = document.querySelector("#editor");
    const library = document.querySelector("#library");
    const save = document.querySelector("#save");
    const cancel = document.querySelector("#cancel");
    const reset = document.querySelector("#reset");
    const status = document.querySelector("#status");
    let restaurants = loadRestaurants();
    let current = "";

    function loadRestaurants() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (Array.isArray(saved) && saved.length > 0) {
          return sanitize(saved);
        }
      } catch {}

      return defaultRestaurants;
    }

    function sanitize(items) {
      return [...new Set(items.map((item) => String(item).trim()).filter(Boolean))];
    }

    function saveRestaurants(items) {
      restaurants = sanitize(items);
      localStorage.setItem(storageKey, JSON.stringify(restaurants));
      library.value = restaurants.join("\n");
      status.textContent = `\u5df2\u4fdd\u5b58 ${restaurants.length} \u5bb6`;
      pickRestaurant();
    }

    function pickRestaurant() {
      if (restaurants.length === 0) {
        current = "";
        result.textContent = "\u8bf7\u5148\u6dfb\u52a0\u9910\u5385";
        count.textContent = "0 \u5bb6\u9910\u5385\u5e93";
        return;
      }

      const index = Math.floor(Math.random() * restaurants.length);
      current = restaurants[index];
      result.textContent = current;
      count.textContent = `${restaurants.length} \u5bb6\u9910\u5385\u5e93`;
      document.title = `${current} | \u4eca\u665a\u5403\u54ea\u5bb6`;
    }

    function openEditor() {
      library.value = restaurants.join("\n");
      status.textContent = "";
      editor.classList.add("open");
      library.focus();
    }

    reroll.addEventListener("click", pickRestaurant);
    editToggle.addEventListener("click", openEditor);
    cancel.addEventListener("click", () => editor.classList.remove("open"));
    save.addEventListener("click", () => saveRestaurants(library.value.split(/\r?\n/)));
    reset.addEventListener("click", () => saveRestaurants(defaultRestaurants));

    pickRestaurant();
  </script>
</body>
</html>
